<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #9e2b25;
  --red-d:  #7a1f1a;
  --gold:   #b8923f;
  --ink:    #161412;
  --mid:    #6f6862;
  --faint:  #a39b94;
  --line:   #e6e1da;
  --cream:  #f6f3ee;
  --paper:  #fbf9f5;
  --white:  #ffffff;
  --night:  #14110f;
  --disp:   'Fraunces', serif;
  --sans:   'Manrope', 'Noto Sans JP', sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); color: var(--ink); background: var(--paper); font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: inherit; }
:lang(ja) { font-feature-settings: "palt"; }
.num { font-variant-numeric: tabular-nums lining-nums; }
::selection { background: var(--red); color: #fff; }

/* ===== HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center;
  padding: 0 clamp(20px, 4vw, 56px); height: 64px;
  background: rgba(251,249,245,0.88); backdrop-filter: blur(16px) saturate(1.2);
  border-bottom: 1px solid var(--line);
}
.h-logo { font-family: var(--disp); font-size: 21px; font-weight: 600; color: var(--ink); white-space: nowrap; }
.h-logo .mark { color: var(--gold); font-style: italic; }
.h-nav { display: flex; gap: 30px; margin-left: 48px; }
.h-nav a { font-size: 12px; font-weight: 600; color: var(--mid); transition: color 0.2s; }
.h-nav a:hover { color: var(--ink); }
.h-nav a.active { color: var(--red); }
.h-right { margin-left: auto; }
.h-cta { font-size: 12px; font-weight: 700; background: var(--red); color: #fff; padding: 10px 22px; border-radius: 100px; transition: background 0.25s; }
.h-cta:hover { background: var(--red-d); }

/* ===== BREADCRUMB ===== */
.crumb { padding: 16px clamp(20px,4vw,56px); border-bottom: 1px solid var(--line); background: var(--white); }
.crumb-inner { max-width: 1240px; margin: 0 auto; font-size: 12px; color: var(--faint); display: flex; gap: 8px; align-items: center; }
.crumb a { color: var(--red); font-weight: 600; }
.crumb a:hover { text-decoration: underline; }

/* ===== LAYOUT ===== */
.wrap { max-width: 1240px; margin: 0 auto; padding: clamp(28px,4vw,48px) clamp(20px,4vw,56px) 80px; }
.layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: clamp(28px,4vw,56px); align-items: start; }

/* ===== TITLE ===== */
.car-head { margin-bottom: 28px; }
.car-flags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.flag {
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
  padding: 5px 14px; border-radius: 100px;
}
.flag.available { background: #f0f7f1; color: #1f7a3d; border: 1px solid #c4e0cb; }
.flag.reserved  { background: #fbf4e6; color: #a4710f; border: 1px solid #ecd9ad; }
.flag.sold      { background: #f1efed; color: var(--mid);  border: 1px solid var(--line); }
.flag.export    { background: var(--night); color: var(--gold); }
.car-title { font-family: var(--disp); font-size: clamp(30px,4vw,44px); font-weight: 500; line-height: 1.1; letter-spacing: -0.02em; }
.car-sub { font-size: 14px; color: var(--mid); margin-top: 8px; }
.car-code { font-size: 11px; color: var(--faint); margin-top: 4px; letter-spacing: 0.04em; }

/* ===== GALLERY ===== */
.gallery { margin-bottom: 36px; }
.main-photo {
  aspect-ratio: 16/10; border-radius: 6px; overflow: hidden; position: relative;
  background: linear-gradient(135deg, #ece7e0, #ddd6cc);
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--line); margin-bottom: 10px;
}
.main-photo-label { font-family: var(--disp); font-size: 16px; font-style: italic; color: rgba(22,20,18,0.26); }
.photo-count {
  position: absolute; bottom: 14px; right: 14px;
  font-size: 11px; font-weight: 600; background: rgba(20,17,15,0.7); color: #fff;
  padding: 5px 13px; border-radius: 100px; backdrop-filter: blur(4px);
}
.thumbs { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
.thumb {
  aspect-ratio: 4/3; border-radius: 4px; overflow: hidden;
  background: linear-gradient(135deg, #ece7e0, #ddd6cc);
  border: 1px solid var(--line); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: rgba(22,20,18,0.3); transition: all 0.2s;
}
.thumb:hover { border-color: var(--gold); }
.thumb.active { border-color: var(--red); border-width: 2px; }

/* ===== SPEC SECTIONS ===== */
.spec-sec { margin-bottom: 36px; }
.spec-sec-title {
  font-family: var(--disp); font-size: 22px; font-weight: 600; margin-bottom: 18px;
  display: flex; align-items: center; gap: 16px;
}
.spec-sec-title::after { content:''; flex:1; height:1px; background: var(--line); }
.spec-rows { display: flex; flex-direction: column; }
.spec-row {
  display: grid; grid-template-columns: 160px 1fr; gap: 24px;
  padding: 13px 0; border-bottom: 1px solid var(--line); align-items: baseline;
}
.spec-row:first-child { border-top: 1px solid var(--line); }
.spec-key { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
.spec-val { font-size: 14px; color: var(--ink); font-variant-numeric: lining-nums; }
.comment-box { font-size: 14px; color: var(--mid); line-height: 1.95; }

/* ===== SIDEBAR ===== */
.sidebar { position: sticky; top: 88px; display: flex; flex-direction: column; gap: 20px; }
.price-card {
  background: var(--night); border-radius: 6px; padding: 30px 28px;
  position: relative; overflow: hidden;
}
.price-card::before { content:''; position:absolute; inset:0; background: radial-gradient(100% 100% at 100% 0%, rgba(158,43,37,0.25), transparent 55%); }
.price-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; position: relative; }
.price-main { display: flex; align-items: baseline; gap: 6px; position: relative; }
.price-num { font-family: var(--disp); font-size: 48px; font-weight: 500; color: #fff; line-height: 1; font-variant-numeric: lining-nums; }
.price-unit { font-size: 13px; color: rgba(255,255,255,0.5); }
.price-note { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 10px; position: relative; }
.price-fob { display: flex; justify-content: space-between; align-items: baseline; margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.12); position: relative; }
.fob-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); }
.fob-val { font-family: var(--disp); font-size: 20px; font-weight: 500; color: var(--gold); font-variant-numeric: lining-nums; }
.fob-rate { font-size: 10px; color: rgba(255,255,255,0.3); }

.inq-card { background: var(--white); border: 1px solid var(--line); border-radius: 6px; padding: 28px; }
.inq-title { font-family: var(--disp); font-size: 20px; font-weight: 600; margin-bottom: 22px; }
.fg { margin-bottom: 15px; }
.fl { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); display: block; margin-bottom: 7px; }
.fl .req { color: var(--red); }
.fi, .fs, .ft {
  width: 100%; border: 1px solid var(--line); padding: 11px 13px;
  font-size: 13px; font-family: var(--sans); outline: none; border-radius: 4px;
  transition: all 0.2s; background: var(--paper); color: var(--ink);
}
.fi:focus, .fs:focus, .ft:focus { border-color: var(--red); background: #fff; box-shadow: 0 0 0 3px rgba(158,43,37,0.07); }
.ft { resize: vertical; min-height: 84px; line-height: 1.7; }
.submit-btn {
  width: 100%; background: var(--red); color: #fff; border: none;
  padding: 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
  cursor: pointer; border-radius: 100px; transition: all 0.25s; font-family: var(--sans); margin-top: 4px;
}
.submit-btn:hover { background: var(--red-d); transform: translateY(-1px); }
.wa-btn {
  width: 100%; background: var(--white); border: 1px solid #25d366; color: #1a9e4b;
  padding: 12px; font-size: 12px; font-weight: 700; cursor: pointer;
  border-radius: 100px; margin-top: 9px; font-family: var(--sans); transition: all 0.25s;
}
.wa-btn:hover { background: #25d366; color: #fff; }
.form-success { display: none; border: 1px solid #b6dcc0; background: #f0f8f2; padding: 13px; text-align: center; color: #1f7a3d; font-size: 12px; margin-top: 12px; border-radius: 4px; }
.share-row { display: flex; gap: 8px; }
.share-btn {
  flex: 1; font-size: 11px; font-weight: 600; color: var(--mid);
  border: 1px solid var(--line); background: var(--white); border-radius: 100px;
  padding: 9px 4px; cursor: pointer; transition: all 0.2s; font-family: var(--sans);
}
.share-btn:hover { border-color: var(--ink); color: var(--ink); }

/* ===== SIMILAR ===== */
.similar-sec { margin-top: 64px; }
.similar-title { font-family: var(--disp); font-size: 26px; font-weight: 600; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
.similar-title::after { content:''; flex:1; height:1px; background: var(--line); }
.similar-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: clamp(14px,2vw,22px); }
.sim-card { display: block; color: inherit; }
.sim-thumb {
  aspect-ratio: 4/3; border-radius: 4px; background: linear-gradient(135deg, #ece7e0, #ddd6cc);
  border: 1px solid var(--line); display: flex; align-items: center; justify-content: center;
  font-family: var(--disp); font-size: 11px; font-style: italic; color: rgba(22,20,18,0.25);
  transition: transform 0.3s, box-shadow 0.3s; margin-bottom: 12px;
}
.sim-card:hover .sim-thumb { transform: translateY(-3px); box-shadow: 0 14px 30px -16px rgba(22,20,18,0.35); }
.sim-name { font-family: var(--disp); font-size: 16px; font-weight: 600; line-height: 1.2; }
.sim-grade { font-size: 11px; color: var(--mid); margin: 2px 0 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sim-price { font-family: var(--disp); font-size: 18px; font-weight: 600; color: var(--red); font-variant-numeric: lining-nums; }
.sim-price span { font-family: var(--sans); font-size: 10px; color: var(--faint); font-weight: 400; }

/* ===== FOOTER ===== */
footer { background: #0d0b09; padding: 48px clamp(20px,4vw,56px) 32px; margin-top: 80px; }
.footer-inner { max-width: 1240px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-brand { font-family: var(--disp); font-size: 20px; font-weight: 600; color: #fff; }
.footer-brand .mark { color: var(--gold); font-style: italic; }
.footer-note { font-size: 11px; color: rgba(255,255,255,0.3); }
.footer-back { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); transition: color 0.2s; }
.footer-back:hover { color: #fff; }

/* ===== TOAST ===== */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--ink); color: #fff; padding: 13px 28px; font-size: 13px; opacity: 0; pointer-events: none; z-index: 9999; border-radius: 100px; transition: all 0.3s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 960px) {
  .h-nav { display: none; }
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .similar-grid { grid-template-columns: 1fr 1fr; }
  .spec-row { grid-template-columns: 120px 1fr; gap: 14px; }
}
</style>

const params = new URLSearchParams(location.search);
const carId = parseInt(params.get('id')) || 1;
const car = CARS.find(c => c.id === carId) || CARS[0];

const STATUS = { available: ['available','在庫あり'], reserved: ['reserved','商談中'], sold: ['sold','売約済み'] };

function init() {
  document.title = `${car.name} ${car.grade} — Habibi Auto Trading`;
  document.getElementById('bc-name').textContent = car.name;
  document.getElementById('d-name').textContent = car.name;
  document.getElementById('d-grade').textContent = `${car.grade}（${car.type}）`;
  document.getElementById('d-code').textContent = `管理番号 HAB-${String(car.id).padStart(4,'0')}`;
  document.getElementById('d-comment').textContent = car.comment;

  const [cls, label] = STATUS[car.status];
  document.getElementById('flags').innerHTML =
    `<span class="flag ${cls}">${label}</span>` +
    (car.export ? '<span class="flag export">輸出向け</span>' : '');

  document.getElementById('rc-price').textContent = car.price.toLocaleString();
  document.getElementById('rc-fob').textContent = '$' + Math.round(car.price * 10000 / 159).toLocaleString();

  const specs = [
    ['メーカー', car.maker], ['車名', car.name], ['グレード', car.grade],
    ['型式', car.type], ['年式', `${car.year}年`], ['走行距離', `${(car.km*10000).toLocaleString()} km`],
    ['車体色', car.color], ['エンジン', car.engine], ['燃料', car.fuel],
    ['ミッション', car.trans], ['駆動方式', car.drive], ['乗車定員', `${car.seats}名`],
    ['車検', car.shaken], ['修復歴', car.repair], ['評価点', car.score],
  ];
  document.getElementById('specRows').innerHTML = specs.map(([k,v]) =>
    `<div class="spec-row"><div class="spec-key">${k}</div><div class="spec-val num">${v}</div></div>`).join('');

  const equips = [['安全装備', car.safety], ['快適装備', car.comfort], ['ナビ / AV', car.navi], ['その他', car.other]];
  document.getElementById('equipRows').innerHTML = equips.map(([k,v]) =>
    `<div class="spec-row"><div class="spec-key">${k}</div><div class="spec-val">${v}</div></div>`).join('');

  document.getElementById('thumbs').innerHTML = [1,2,3,4,5].map((n,i) =>
    `<div class="thumb ${i===0?'active':''}" onclick="setThumb(this, ${n})">${n}</div>`).join('');

  const similar = CARS.filter(c => c.id !== car.id && (c.name === car.name || (c.export && car.export))).slice(0,4);
  document.getElementById('similarGrid').innerHTML = similar.map(c => `
    <a class="sim-card" href="detail.html?id=${c.id}">
      <div class="sim-thumb">Photo</div>
      <div class="sim-name">${c.name}</div>
      <div class="sim-grade">${c.grade}</div>
      <div class="sim-price num">${c.price.toLocaleString()}<span> 万円</span></div>
    </a>`).join('');
}

function setThumb(el, n) {
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('photoCount').textContent = `${n} / 5`;
}

function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if (!name || !email) { showToast('お名前とメールアドレスは必須です'); return; }
  document.getElementById('successMsg').style.display = 'block';
  showToast('お問い合わせを送信しました');
}
function openWhatsApp() {
  const msg = encodeURIComponent(`【在庫問い合わせ】${car.name} ${car.grade}（${car.year}年 走行${car.km}万km ${car.price}万円）について詳細をお聞きしたいです。`);
  window.open('https://wa.me/818012345678?text=' + msg, '_blank');
}
function copyUrl() { navigator.clipboard.writeText(location.href).then(() => showToast('URLをコピーしました')); }
function shareLine() { window.open('https://line.me/R/msg/text/?' + encodeURIComponent(location.href), '_blank'); }
function shareX() { window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(location.href)}&text=${encodeURIComponent(car.name + ' ' + car.price + '万円 | Habibi Auto Trading')}`, '_blank'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
init();
</script>
