<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫車両 — Habibi Auto Trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #9e2b25;
  --red-d:  #7a1f1a;
  --gold:   #b8923f;
  --ink:    #161412;
  --ink-2:  #2b2724;
  --mid:    #6f6862;
  --faint:  #a39b94;
  --line:   #e6e1da;
  --cream:  #f6f3ee;
  --paper:  #fbf9f5;
  --white:  #ffffff;
  --night:  #14110f;
  --disp:   'Fraunces', serif;
  --sans:   'Manrope', 'Noto Sans JP', sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); color: var(--ink); background: var(--paper); font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: inherit; }
:lang(ja) { font-feature-settings: "palt"; }
.num { font-variant-numeric: tabular-nums lining-nums; }
::selection { background: var(--red); color: #fff; }

/* ===== HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center;
  padding: 0 clamp(20px, 4vw, 56px); height: 64px;
  background: rgba(251,249,245,0.88); backdrop-filter: blur(16px) saturate(1.2);
  border-bottom: 1px solid var(--line);
}
.h-logo { font-family: var(--disp); font-size: 21px; font-weight: 600; color: var(--ink); white-space: nowrap; }
.h-logo .mark { color: var(--gold); font-style: italic; }
.h-nav { display: flex; gap: 30px; margin-left: 48px; }
.h-nav a { font-size: 12px; font-weight: 600; color: var(--mid); transition: color 0.2s; position: relative; padding: 4px 0; }
.h-nav a::after { content:''; position:absolute; left:0; bottom:-2px; width:0; height:1px; background: var(--gold); transition: width 0.25s; }
.h-nav a:hover { color: var(--ink); }
.h-nav a:hover::after { width: 100%; }
.h-nav a.active { color: var(--red); }
.h-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.h-cta { font-size: 12px; font-weight: 700; background: var(--red); color: #fff; padding: 10px 22px; border-radius: 100px; transition: all 0.25s; white-space: nowrap; }
.h-cta:hover { background: var(--red-d); }

/* ===== PAGE HEAD ===== */
.page-head { background: var(--night); padding: clamp(48px,7vw,84px) clamp(20px,4vw,56px); position: relative; overflow: hidden; }
.page-head::before { content:''; position:absolute; inset:0; background: radial-gradient(90% 100% at 85% 0%, rgba(158,43,37,0.2), transparent 55%); }
.page-head-inner { max-width: 1240px; margin: 0 auto; position: relative; }
.eyebrow { display: inline-flex; align-items: center; gap: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }
.eyebrow::before { content:''; width: 28px; height: 1px; background: var(--gold); }
.page-title { font-family: var(--disp); font-size: clamp(34px,5vw,58px); font-weight: 500; color: #fff; line-height: 1.05; letter-spacing: -0.02em; }
.page-title em { font-style: italic; font-weight: 400; color: var(--gold); }
.page-sub { font-size: 14px; color: rgba(255,255,255,0.45); margin-top: 16px; max-width: 480px; }

/* ===== TOOLBAR ===== */
.toolbar {
  background: var(--white); border-bottom: 1px solid var(--line);
  padding: 0 clamp(20px,4vw,56px); position: sticky; top: 64px; z-index: 100;
}
.toolbar-inner { max-width: 1240px; margin: 0 auto; display: flex; align-items: center; gap: 14px; height: 60px; flex-wrap: nowrap; overflow-x: auto; }
.tb-count { font-size: 13px; color: var(--mid); white-space: nowrap; }
.tb-count strong { font-family: var(--disp); font-size: 19px; font-weight: 600; color: var(--ink); }
.tb-spacer { flex: 1; }
.tb-select {
  font-family: var(--sans); font-size: 12px; font-weight: 600; color: var(--ink);
  border: 1px solid var(--line); border-radius: 100px; padding: 8px 16px;
  background: var(--white); cursor: pointer; outline: none; white-space: nowrap;
}
.tb-select:focus { border-color: var(--red); }

/* ===== QUICK FILTERS ===== */
.quick-row { background: var(--white); padding: 14px clamp(20px,4vw,56px) 18px; border-bottom: 1px solid var(--line); }
.quick-inner { max-width: 1240px; margin: 0 auto; display: flex; gap: 8px; flex-wrap: wrap; }
.qtag {
  font-size: 12px; font-weight: 600; color: var(--mid);
  border: 1px solid var(--line); border-radius: 100px; padding: 7px 17px;
  cursor: pointer; transition: all 0.2s; background: var(--white); user-select: none;
}
.qtag:hover { border-color: var(--red); color: var(--red); }
.qtag.on { background: var(--red); border-color: var(--red); color: #fff; }

/* ===== MAIN ===== */
.main { padding: clamp(32px,4vw,48px) clamp(20px,4vw,56px) 80px; }
.main-inner { max-width: 1240px; margin: 0 auto; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(265px, 1fr)); gap: clamp(18px,2vw,26px); }
.card { display: block; color: inherit; }
.card-thumb {
  aspect-ratio: 4/3; border-radius: 4px; overflow: hidden; position: relative;
  background: linear-gradient(135deg, #ece7e0, #ddd6cc);
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--line); transition: transform 0.35s cubic-bezier(.2,.7,.2,1), box-shadow 0.35s;
}
.card:hover .card-thumb { transform: translateY(-4px); box-shadow: 0 20px 40px -20px rgba(22,20,18,0.35); }
.card-thumb-label { font-family: var(--disp); font-size: 13px; font-style: italic; color: rgba(22,20,18,0.26); }
.badge {
  position: absolute; top: 12px; left: 12px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 4px 11px; border-radius: 100px; color: #fff;
}
.badge.available { background: var(--red); }
.badge.reserved  { background: #b07c2a; }
.badge.sold      { background: #6f6862; }
.badge-export {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
  background: rgba(20,17,15,0.78); color: var(--gold); padding: 4px 11px; border-radius: 100px;
  backdrop-filter: blur(4px);
}
.card-body { padding: 16px 4px 0; }
.card-name { font-family: var(--disp); font-size: 19px; font-weight: 600; line-height: 1.2; margin-bottom: 3px; }
.card-grade { font-size: 12px; color: var(--mid); margin-bottom: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-price { display: flex; align-items: baseline; gap: 4px; margin-bottom: 12px; }
.card-price-num { font-family: var(--disp); font-size: 25px; font-weight: 600; color: var(--red); line-height: 1; font-variant-numeric: lining-nums; }
.card-price-unit { font-size: 12px; color: var(--faint); }
.card-meta { display: flex; flex-wrap: wrap; gap: 5px 13px; padding-top: 12px; border-top: 1px solid var(--line); }
.card-meta span { font-size: 11px; color: var(--mid); font-variant-numeric: lining-nums; }
.card-meta .hl { color: var(--red); font-weight: 600; }

/* ===== EMPTY ===== */
.empty { text-align: center; padding: 80px 20px; color: var(--mid); }
.empty-title { font-family: var(--disp); font-size: 24px; color: var(--ink); margin-bottom: 8px; }

/* ===== PAGINATION ===== */
.pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 56px; }
.pg {
  min-width: 38px; height: 38px; border: 1px solid var(--line);
  background: var(--white); border-radius: 100px; font-size: 13px; font-weight: 600;
  cursor: pointer; color: var(--ink); padding: 0 13px;
  transition: all 0.2s; font-family: var(--sans); font-variant-numeric: lining-nums;
}
.pg:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
.pg.active { background: var(--red); color: #fff; border-color: var(--red); }
.pg:disabled { opacity: 0.35; cursor: default; }

/* ===== FOOTER ===== */
footer { background: #0d0b09; padding: 48px clamp(20px,4vw,56px) 32px; }
.footer-inner { max-width: 1240px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-brand { font-family: var(--disp); font-size: 20px; font-weight: 600; color: #fff; }
.footer-brand .mark { color: var(--gold); font-style: italic; }
.footer-note { font-size: 11px; color: rgba(255,255,255,0.3); }
.footer-back { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); transition: color 0.2s; }
.footer-back:hover { color: #fff; }

@media (max-width: 900px) {
  .h-nav { display: none; }
  .toolbar { top: 64px; }
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="h-logo">Habibi&nbsp;<span class="mark">Auto Trading</span></a>
  <nav class="h-nav">
    <a href="index.html#services">事業内容</a>
    <a href="index.html#flow">取引の流れ</a>
    <a href="used_car_site.html" class="active">在庫車両</a>
    <a href="parts.html">部品在庫</a>
    <a href="index.html#regions">輸出エリア</a>
    <a href="about.html">会社概要</a>
    <a href="index.html#contact">お問い合わせ</a>
  </nav>
  <div class="h-right">
    <a href="index.html#contact" class="h-cta">お問い合わせ</a>
  </div>
</header>

<div class="page-head">
  <div class="page-head-inner">
    <div class="eyebrow">Inventory</div>
    <h1 class="page-title">在庫<em>車両一覧</em></h1>
    <p class="page-sub">輸出向け・国内向けともに随時更新中。気になる車両はお気軽にお問い合わせください。</p>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="tb-count"><strong class="num" id="count">0</strong> 台の車両</div>
    <div class="tb-spacer"></div>
    <select class="tb-select" id="modelSel" onchange="applyFilters()">
      <option value="">すべての車種</option>
      <option>ハイエース</option>
      <option>ランドクルーザー</option>
      <option>プラド</option>
      <option>アルファード</option>
      <option>プリウス</option>
      <option>ノア</option>
      <option>ヴィッツ</option>
      <option>プロボックス</option>
    </select>
    <select class="tb-select" id="sortSel" onchange="applyFilters()">
      <option value="new">新着順</option>
      <option value="price_asc">価格が安い順</option>
      <option value="price_desc">価格が高い順</option>
      <option value="km_asc">走行距離が少ない順</option>
      <option value="year_desc">年式が新しい順</option>
    </select>
  </div>
</div>

<div class="quick-row">
  <div class="quick-inner" id="qtags">
    <span class="qtag on" data-q="">すべて</span>
    <span class="qtag" data-q="export">輸出向け</span>
    <span class="qtag" data-q="under10">10万km以下</span>
    <span class="qtag" data-q="under100">〜100万円</span>
    <span class="qtag" data-q="100-300">100〜300万円</span>
    <span class="qtag" data-q="over300">300万円〜</span>
    <span class="qtag" data-q="diesel">ディーゼル</span>
    <span class="qtag" data-q="4wd">4WD</span>
    <span class="qtag" data-q="available">在庫ありのみ</span>
  </div>
</div>

<main class="main">
  <div class="main-inner">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <div class="empty-title">該当する車両が見つかりませんでした</div>
      <p>条件を変えて再度お試しください。</p>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">Habibi <span class="mark">Auto Trading</span></div>
    <a href="index.html" class="footer-back">← トップページへ戻る</a>
    <div class="footer-note num">© 2026 Habibi Auto Trading 合同会社</div>
  </div>
</footer>

<script>
const CARS = [
  { id: 1,  name: "ハイエース バン",        grade: "DX GL パッケージ 標準ボディ",  year: 2019, km: 8.2,  price: 189, fuel: "ディーゼル", trans: "AT",  drive: "2WD", status: "available", export: true  },
  { id: 2,  name: "ランドクルーザー プラド", grade: "TX Lパッケージ 4WD",           year: 2018, km: 6.1,  price: 348, fuel: "ガソリン",   trans: "AT",  drive: "4WD", status: "available", export: true  },
  { id: 3,  name: "ランドクルーザー プラド", grade: "TX 4WD 走行22万km",            year: 2014, km: 22.4, price: 138, fuel: "ガソリン",   trans: "AT",  drive: "4WD", status: "available", export: true  },
  { id: 4,  name: "アルファード",            grade: "2.5S Cパッケージ",             year: 2020, km: 4.5,  price: 420, fuel: "ガソリン",   trans: "CVT", drive: "2WD", status: "reserved",  export: false },
  { id: 5,  name: "プリウス",                grade: "S 1.8L ハイブリッド",          year: 2017, km: 11.3, price: 98,  fuel: "HV",        trans: "CVT", drive: "2WD", status: "available", export: false },
  { id: 6,  name: "ノア",                    grade: "Si W×B III 7人乗り",          year: 2021, km: 3.8,  price: 265, fuel: "ガソリン",   trans: "CVT", drive: "2WD", status: "available", export: false },
  { id: 7,  name: "ハイエース バン",         grade: "スーパーGL ダークプライム",    year: 2022, km: 2.1,  price: 368, fuel: "ディーゼル", trans: "AT",  drive: "2WD", status: "available", export: true  },
  { id: 8,  name: "プロボックス",            grade: "DX 1.5L",                      year: 2016, km: 18.7, price: 55,  fuel: "ガソリン",   trans: "AT",  drive: "2WD", status: "sold",      export: false },
  { id: 9,  name: "ランドクルーザー 200",    grade: "ZX 4WD フルオプション",        year: 2019, km: 5.5,  price: 680, fuel: "ディーゼル", trans: "AT",  drive: "4WD", status: "available", export: true  },
  { id: 10, name: "ヴィッツ",               grade: "F 1.0L",                        year: 2018, km: 7.2,  price: 68,  fuel: "ガソリン",   trans: "CVT", drive: "2WD", status: "available", export: false },
  { id: 11, name: "ノア ハイブリッド",       grade: "G 1.8HV 8人乗り",             year: 2020, km: 6.4,  price: 248, fuel: "HV",        trans: "CVT", drive: "2WD", status: "available", export: false },
  { id: 12, name: "ランクル プラド",         grade: "TZ-G ディーゼル 4WD",         year: 2022, km: 1.8,  price: 498, fuel: "ディーゼル", trans: "AT",  drive: "4WD", status: "available", export: true  },
];

let quickFilter = '';
let page = 1;
const PER = 12;

const STATUS = {
  available: ['available', '在庫あり'],
  reserved:  ['reserved',  '商談中'],
  sold:      ['sold',      '売約済み'],
};

function getFiltered() {
  let list = [...CARS];
  const model = document.getElementById('modelSel').value;
  if (model) list = list.filter(c => c.name.includes(model));

  if (quickFilter === 'export')    list = list.filter(c => c.export);
  if (quickFilter === 'under10')   list = list.filter(c => c.km <= 10);
  if (quickFilter === 'under100')  list = list.filter(c => c.price < 100);
  if (quickFilter === '100-300')   list = list.filter(c => c.price >= 100 && c.price <= 300);
  if (quickFilter === 'over300')   list = list.filter(c => c.price > 300);
  if (quickFilter === 'diesel')    list = list.filter(c => c.fuel === 'ディーゼル');
  if (quickFilter === '4wd')       list = list.filter(c => c.drive === '4WD');
  if (quickFilter === 'available') list = list.filter(c => c.status === 'available');

  const sort = document.getElementById('sortSel').value;
  if (sort === 'price_asc')  list.sort((a,b) => a.price - b.price);
  if (sort === 'price_desc') list.sort((a,b) => b.price - a.price);
  if (sort === 'km_asc')     list.sort((a,b) => a.km - b.km);
  if (sort === 'year_desc')  list.sort((a,b) => b.year - a.year);
  return list;
}

function render() {
  const list = getFiltered();
  const grid = document.getElementById('grid');
  const start = (page - 1) * PER;
  const pageItems = list.slice(start, start + PER);

  document.getElementById('count').textContent = list.length;
  document.getElementById('empty').style.display = list.length ? 'none' : 'block';

  grid.innerHTML = pageItems.map(c => {
    const [cls, label] = STATUS[c.status];
    return `
    <a class="card" href="detail.html?id=${c.id}">
      <div class="card-thumb">
        <span class="badge ${cls}">${label}</span>
        ${c.export ? '<span class="badge-export">輸出向け</span>' : ''}
        <span class="card-thumb-label">Photo</span>
      </div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-grade">${c.grade}</div>
        <div class="card-price"><span class="card-price-num num">${c.price.toLocaleString()}</span><span class="card-price-unit">万円（税込）</span></div>
        <div class="card-meta num">
          <span>${c.year}年式</span>
          <span>走行 ${c.km}万km</span>
          <span class="${c.fuel === 'ディーゼル' ? 'hl' : ''}">${c.fuel}</span>
          <span>${c.trans}</span>
          <span class="${c.drive === '4WD' ? 'hl' : ''}">${c.drive}</span>
        </div>
      </div>
    </a>`;
  }).join('');

  renderPagination(list.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = `<button class="pg" onclick="goPage(${page-1})" ${page===1?'disabled':''}>←</button>`;
  for (let i = 1; i <= pages; i++) html += `<button class="pg num ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  html += `<button class="pg" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>→</button>`;
  el.innerHTML = html;
}

function goPage(n) {
  const pages = Math.ceil(getFiltered().length / PER);
  if (n < 1 || n > pages) return;
  page = n; render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilters() { page = 1; render(); }

document.querySelectorAll('.qtag').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.qtag').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    quickFilter = t.dataset.q;
    applyFilters();
  });
});

render();
</script>
</body>
</html>
